name: Sync dev to main

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-dev-to-main
  cancel-in-progress: false

jobs:
  sync:
    name: Generate main from dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          submodules: recursive

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate main and regenerate dependency files
        run: |
          set -euo pipefail

          # Preserve the SDK from dev at the path used by HAMS packaging.
          if [ ! -f submodules/unitree_sdk2_python/pyproject.toml ]; then
            echo "submodules/unitree_sdk2_python was not initialized correctly" >&2
            exit 1
          fi
          rm -rf ../../../unitree_sdk2_python
          cp -a submodules/unitree_sdk2_python ../../../unitree_sdk2_python

          # Fetch main so --force-with-lease can verify it was not updated concurrently.
          git fetch origin main

          # main should not ship the submodule config or gitlink; it uses the HAMS SDK checkout.
          if git ls-files --error-unmatch submodules/unitree_sdk2_python >/dev/null 2>&1; then
            git submodule deinit -f submodules/unitree_sdk2_python || true
            git rm -f submodules/unitree_sdk2_python
          fi
          rm -f .gitmodules
          rm -rf .git/modules/submodules/unitree_sdk2_python submodules/unitree_sdk2_python

          python3 - <<'PY'
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text()
          old = "[tool.uv.workspace]\nmembers = [\n    \"submodules/unitree_sdk2_python\",\n]"
          new = "[tool.uv.workspace]\nmembers = [\n    \"../../../unitree_sdk2_python\",\n]"
          if old in text:
              path.write_text(text.replace(old, new))
          elif new not in text:
              raise SystemExit("Expected [tool.uv.workspace] members block was not found")

          path = Path("README.md")
          text = path.read_text()
          old = """- Download Unitree SDK under `submodules/unitree_sdk2_python` by initializing git submodules:

              ```bash
              git submodule update --init --recursive
              ```"""
          new = (
              "- The `main` branch is meant to be compatible with "
              "[HAMS](https://github.com/correlllab/HAMS), "
              "so place Unitree SDK at `../../../unitree_sdk2_python`.\n"
              "- The [dev branch](https://github.com/correlllab/h12_safety_layer/tree/dev) "
              "is for local testing."
          )
          if old in text:
              path.write_text(text.replace(old, new))
          elif new not in text:
              raise SystemExit("Expected README Unitree SDK setup block was not found")
          PY

          uv sync
          uv export --format requirements-txt --no-hashes -o requirements.txt

          if git ls-files --error-unmatch .gitmodules >/dev/null 2>&1; then
            git add -A .gitmodules
          fi
          git add -A pyproject.toml uv.lock requirements.txt README.md
          if git diff --cached --quiet; then
            echo "No changes to commit on main."
            exit 0
          fi

          git commit -m "Sync dev to main"
          git push --force-with-lease origin HEAD:main
