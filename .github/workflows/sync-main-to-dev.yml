name: Sync main to dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-main-dev
  cancel-in-progress: false

jobs:
  sync:
    name: Generate dev from main
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate dev and regenerate dependency files
        run: |
          set -euo pipefail
          source_main="$(git rev-parse HEAD)"

          # Fetch dev so --force-with-lease can verify it was not updated concurrently,
          # and so the dev-only submodule metadata can be restored.
          git fetch origin dev

          if [ -z "$(git ls-tree origin/dev .gitmodules)" ]; then
            echo "origin/dev does not contain .gitmodules" >&2
            exit 1
          fi
          if [ -z "$(git ls-tree origin/dev submodules/unitree_sdk2_python)" ]; then
            echo "origin/dev does not contain submodules/unitree_sdk2_python" >&2
            exit 1
          fi

          git checkout origin/dev -- .gitmodules submodules/unitree_sdk2_python
          # GitHub-hosted runners do not have SSH credentials for submodules.
          git config -f .gitmodules submodule.submodules/unitree_sdk2_python.url https://github.com/Oya-Tomo/unitree_sdk2_python.git
          git submodule sync --recursive
          git submodule update --init --recursive
          if [ ! -f submodules/unitree_sdk2_python/pyproject.toml ]; then
            echo "submodules/unitree_sdk2_python was not initialized correctly" >&2
            exit 1
          fi

          python3 - <<'PY'
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text()
          main = "[tool.uv.workspace]\nmembers = [\n    \"../../../unitree_sdk2_python\",\n]"
          dev = "[tool.uv.workspace]\nmembers = [\n    \"submodules/unitree_sdk2_python\",\n]"
          if main in text:
              path.write_text(text.replace(main, dev))
          elif dev not in text:
              raise SystemExit("Expected [tool.uv.workspace] members block was not found")

          path = Path("README.md")
          text = path.read_text()
          main = (
              "- The `main` branch is meant to be compatible with "
              "[HAMS](https://github.com/correlllab/HAMS), "
              "so place Unitree SDK at `../../../unitree_sdk2_python`.\n"
              "- The [dev branch](https://github.com/correlllab/h12_safety_layer/tree/dev) "
              "is for local testing."
          )
          dev = """- Download Unitree SDK under `submodules/unitree_sdk2_python` by initializing git submodules:

              ```bash
              git submodule update --init --recursive
              ```"""
          if main in text:
              path.write_text(text.replace(main, dev))
          PY

          git submodule update --init --recursive
          uv sync
          uv export --format requirements-txt --no-hashes -o requirements.txt

          git add -A .gitmodules submodules/unitree_sdk2_python pyproject.toml uv.lock requirements.txt README.md
          if git diff --cached --quiet; then
            echo "No changes to commit on dev."
            exit 0
          fi

          git commit -m "Sync main to dev" -m "Source-main: ${source_main}"
          git push --force-with-lease origin HEAD:dev
