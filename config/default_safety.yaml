mode: full_body_mode

topics:
  low_cmd_in: rt/safety/lowcmd_in
  low_cmd_out: rt/lowcmd
  low_state: rt/lowstate

network:
  domain_id: 0
  interface: ''

limits:
  # all fields can be scalar or 27-entry lists for per-joint tuning
  clip:
    position_offset: 0.02
    velocity_ratio: 0.08
    torque_ratio: 0.25
    kp_max: 300.0
    kd_max: 30.0
  estop:
    position_offset: 0.01
    velocity_ratio: 0.5
    torque_ratio:
      - 0.95 # left_hip_yaw_joint
      - 0.95 # left_hip_pitch_joint
      - 0.95 # left_hip_roll_joint
      - 0.95 # left_knee_joint
      - 0.95 # left_ankle_pitch_joint
      - 0.95 # left_ankle_roll_joint
      - 0.95 # right_hip_yaw_joint
      - 0.95 # right_hip_pitch_joint
      - 0.95 # right_hip_roll_joint
      - 0.95 # right_knee_joint
      - 0.95 # right_ankle_pitch_joint
      - 0.95 # right_ankle_roll_joint
      - 0.95 # torso_joint
      - 0.6  # left_shoulder_pitch_joint
      - 0.6  # left_shoulder_roll_joint
      - 0.6  # left_shoulder_yaw_joint
      - 0.7  # left_elbow_joint
      - 0.6  # left_wrist_roll_joint
      - 0.6  # left_wrist_pitch_joint
      - 0.6  # left_wrist_yaw_joint
      - 0.6  # right_shoulder_pitch_joint
      - 0.6  # right_shoulder_roll_joint
      - 0.6  # right_shoulder_yaw_joint
      - 0.7  # right_elbow_joint
      - 0.6  # right_wrist_roll_joint
      - 0.6  # right_wrist_pitch_joint
      - 0.6  # right_wrist_yaw_joint

logging:
  enabled: true
  base_dir: /tmp/h12_safety_layer
  chunk_prefix: chunk_
