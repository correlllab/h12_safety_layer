mode: full_body_mode

topics:
  low_cmd_in: rt/safety/lowcmd_in
  low_cmd_out: rt/lowcmd
  low_state: rt/lowstate

network:
  domain_id: 0
  interface: ''

limits:
  # all fields can be scalar or 27-entry lists for per-joint tuning
  clip:
    position_offset: 0.05
    velocity_ratio: 0.08
    torque_ratio: 0.25
    kp_max: 500.0
    kd_max: 30.0
  estop:
    position_offset: 0.001
    velocity_ratio:
      - 0.5 # left_hip_yaw_joint
      - 0.5 # left_hip_pitch_joint
      - 0.5 # left_hip_roll_joint
      - 0.6 # left_knee_joint
      - 0.5 # left_ankle_pitch_joint
      - 0.5 # left_ankle_roll_joint
      - 0.5 # right_hip_yaw_joint
      - 0.5 # right_hip_pitch_joint
      - 0.5 # right_hip_roll_joint
      - 0.6 # right_knee_joint
      - 0.5 # right_ankle_pitch_joint
      - 0.5 # right_ankle_roll_joint
      - 0.5 # torso_joint
      - 0.5 # left_shoulder_pitch_joint
      - 0.5 # left_shoulder_roll_joint
      - 0.5 # left_shoulder_yaw_joint
      - 0.5 # left_elbow_joint
      - 0.5 # left_wrist_roll_joint
      - 0.5 # left_wrist_pitch_joint
      - 0.5 # left_wrist_yaw_joint
      - 0.5 # right_shoulder_pitch_joint
      - 0.5 # right_shoulder_roll_joint
      - 0.5 # right_shoulder_yaw_joint
      - 0.5 # right_elbow_joint
      - 0.5 # right_wrist_roll_joint
      - 0.5 # right_wrist_pitch_joint
      - 0.5 # right_wrist_yaw_joint
    torque_ratio:
      - 1.0  # left_hip_yaw_joint
      - 1.0  # left_hip_pitch_joint
      - 1.0  # left_hip_roll_joint
      - 1.0  # left_knee_joint
      - 1.0  # left_ankle_pitch_joint
      - 1.0  # left_ankle_roll_joint
      - 1.0  # right_hip_yaw_joint
      - 1.0  # right_hip_pitch_joint
      - 1.0  # right_hip_roll_joint
      - 1.0  # right_knee_joint
      - 1.0  # right_ankle_pitch_joint
      - 1.0  # right_ankle_roll_joint
      - 0.8  # torso_joint
      - 0.6  # left_shoulder_pitch_joint
      - 0.6  # left_shoulder_roll_joint
      - 0.6  # left_shoulder_yaw_joint
      - 0.8  # left_elbow_joint
      - 0.6  # left_wrist_roll_joint
      - 0.6  # left_wrist_pitch_joint
      - 0.6  # left_wrist_yaw_joint
      - 0.6  # right_shoulder_pitch_joint
      - 0.6  # right_shoulder_roll_joint
      - 0.6  # right_shoulder_yaw_joint
      - 0.8  # right_elbow_joint
      - 0.6  # right_wrist_roll_joint
      - 0.6  # right_wrist_pitch_joint
      - 0.6  # right_wrist_yaw_joint

logging:
  enabled: true
  base_dir: /tmp/h12_safety_layer
  chunk_prefix: chunk_
